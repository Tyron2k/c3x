name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'docs/**'
      - 'resources/**'    # so catalog page regenerates when TOMLs change
      - 'ARCHITECTURE.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Regenerate catalog page
        run: |
          go run ./cmd/gen_catalog_doc > docs-site/reference/catalog.md

      - name: Sync narrative docs from top-level
        run: |
          cp ARCHITECTURE.md                  docs-site/reference/architecture.md
          cp docs/integrations/atlantis.md    docs-site/integrations/atlantis.md

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package.json

      - name: Install deps
        run: cd docs-site && npm install

      - name: Build site
        run: cd docs-site && npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
