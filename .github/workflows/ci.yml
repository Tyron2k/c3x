name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l . || true)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go mod verify
        run: go mod verify
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -shuffle=on -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  catalog-offline:
    name: catalog smoke (offline)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      # Offline mode skips network — fast smoke that the catalog loads
      # and every kind has a fixture. The full live verifier runs on
      # its own schedule (catalog-drift.yml).
      - name: catalog smoke (offline)
        run: go run ./cmd/verify_catalog -offline 2>&1 | tail -5
