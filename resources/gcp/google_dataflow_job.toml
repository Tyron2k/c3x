kind         = "google_dataflow_job"
display_name = "GCP Dataflow Job"
provider     = "gcp"

# Dataflow batch workers bill per vCPU-hour + per GiB-hour of RAM.
# Streaming uses different SKUs (~10% premium) — supply usage via
# the streaming attributes if needed; batch is the default shape.

[mappings.vcpu]
service        = "Cloud Dataflow"
product_family = "Compute"
attribute_filters = [
  { key = "description", const = "vCPU Time Batch Iowa" },
]

[mappings.ram]
service        = "Cloud Dataflow"
product_family = "Compute"
attribute_filters = [
  { key = "description", const = "RAM Time Iowa" },
]

[[dimensions]]
id       = "vcpu_hours"
label    = "Worker vCPU-hours"
unit     = "vCPU-hours"
quantity = "default(monthly_vcpu_hours, 0)"
rate     = 'price("vcpu")'
when     = "default(monthly_vcpu_hours, 0) > 0"

[[dimensions]]
id       = "memory_gib_hours"
label    = "Worker memory hours"
unit     = "GiB-hours"
quantity = "default(monthly_memory_gib_hours, 0)"
rate     = 'price("ram")'
when     = "default(monthly_memory_gib_hours, 0) > 0"

[fixture]
# 10 vCPU-hrs × $0.056 + 40 GiB-hrs × $0.003557 = $0.70
attributes = { monthly_vcpu_hours = 10, monthly_memory_gib_hours = 40 }
expected_monthly_cost = 0.70
tolerance = 0.05
