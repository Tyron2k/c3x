kind         = "google_secret_manager_secret"
display_name = "GCP Secret Manager Secret"
provider     = "gcp"

# Secret Manager: $0.06 per active secret version per month after free
# tier of 6 versions. Use published rate.

[mappings.version]
service        = "Secret Manager"
product_family = "ApplicationServices"
attribute_filters = [
  { key = "description", const = "Secret version replica storage" },
]

[[dimensions]]
id       = "active_versions"
label    = "Active secret versions"
unit     = "version-months"
quantity = "default(active_versions, 1)"
rate     = 'price("version")'

[fixture]
attributes = { active_versions = 1 }
expected_monthly_cost = 0.06
exact = true
last_verified = "2026-06-09"

