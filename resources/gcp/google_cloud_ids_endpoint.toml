kind         = "google_cloud_ids_endpoint"
display_name = "GCP Cloud IDS Endpoint"
provider     = "gcp"

# STATIC: $1.16/hr per endpoint + $0.07/GB inspected.

[[dimensions]]
id       = "endpoint"
label    = "IDS endpoint"
unit     = "hours"
quantity = "monthly_hours()"
rate     = "1.16"

[[dimensions]]
id       = "traffic"
label    = "Traffic inspected"
unit     = "GB"
quantity = "default(monthly_inspected_gb, 0)"
rate     = "0.07"
when     = "default(monthly_inspected_gb, 0) > 0"

