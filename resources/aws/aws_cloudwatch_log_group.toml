kind         = "aws_cloudwatch_log_group"
display_name = "AWS CloudWatch Log Group"
provider     = "aws"

[mappings.ingestion_standard]
service        = "AmazonCloudWatch"
product_family = "Data Payload"
attribute_filters = [
  { key = "group", const = "DataProcessing-Bytes" },
]

[mappings.ingestion_ia]
service        = "AmazonCloudWatch"
product_family = "Data Payload"
attribute_filters = [
  { key = "group", const = "DataProcessing-Bytes-IA" },
]

[mappings.storage]
service        = "AmazonCloudWatch"
product_family = "Storage Snapshot"
attribute_filters = []

[mappings.insights]
service        = "AmazonCloudWatch"
product_family = "Data Payload"
attribute_filters = [
  { key = "group", const = "QueryInsights" },
]

[[dimensions]]
id       = "ingestion"
label    = "Data ingested"
unit     = "GB"
quantity = "default(monthly_data_ingested_gb, 0)"
rate     = 'pick(default(log_group_class, "STANDARD") == "INFREQUENT_ACCESS", price("ingestion_ia"), price("ingestion_standard"))'

[[dimensions]]
id       = "storage"
label    = "Data stored (archive)"
unit     = "GB-month"
quantity = "default(monthly_data_stored_gb, 0)"
rate     = 'price("storage")'

[[dimensions]]
id       = "insights_queries"
label    = "Logs Insights queries"
unit     = "GB scanned"
quantity = "default(monthly_data_scanned_gb, 0)"
rate     = 'price("insights")'

[fixture]
attributes = { monthly_data_ingested_gb = 10, monthly_data_scanned_gb = 1, monthly_data_stored_gb = 50 }
expected_monthly_cost = 1.5
tolerance = 0.05

