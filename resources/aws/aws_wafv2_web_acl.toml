kind         = "aws_wafv2_web_acl"
display_name = "AWS WAFv2 Web ACL"
provider     = "aws"

[mappings.web_acl]
service        = "awswaf"
product_family = "Web Application Firewall"
attribute_filters = [
  { key = "group", const = "Web ACL" },
]

[mappings.request]
service        = "awswaf"
product_family = "Web Application Firewall"
attribute_filters = [
  { key = "group", const = "Request" },
]

[[dimensions]]
id       = "web_acl"
label    = "Web ACL"
unit     = "ACL"
quantity = "1"
rate     = 'price("web_acl")'

[[dimensions]]
id       = "requests"
label    = "Inspected requests"
unit     = "1M requests"
quantity = "default(monthly_requests, 0) / 1000000"
rate     = 'price("request")'

[fixture]
attributes = { monthly_requests = 1_000_000 }
expected_monthly_cost = 5
tolerance = 0.05

