kind         = "aws_s3_bucket"
display_name = "AWS S3 Bucket"
provider     = "aws"

[mappings.storage_standard]
service        = "AmazonS3"
product_family = "Storage"
attribute_filters = [
  { key = "volumeType", const = "Standard" },
]

[mappings.tier_1_requests]
service        = "AmazonS3"
product_family = "API Request"
attribute_filters = [
  { key = "group", const = "S3-API-Tier1" },
]

[mappings.tier_2_requests]
service        = "AmazonS3"
product_family = "API Request"
attribute_filters = [
  { key = "group", const = "S3-API-Tier2" },
]

[[dimensions]]
id       = "storage"
label    = "Standard storage"
unit     = "GB-month"
quantity = "default(standard_storage_gb, 0)"
rate     = 'price("storage_standard")'

[[dimensions]]
id       = "tier_1_requests"
label    = "PUT, COPY, POST, LIST requests"
unit     = "requests"
quantity = "default(monthly_tier_1_requests, 0)"
rate     = 'price("tier_1_requests")'

[[dimensions]]
id       = "tier_2_requests"
label    = "GET, SELECT, and other requests"
unit     = "requests"
quantity = "default(monthly_tier_2_requests, 0)"
rate     = 'price("tier_2_requests")'

[fixture]
attributes = { monthly_tier_1_requests = 100_000, monthly_tier_2_requests = 1_000_000, standard_storage_gb = 100 }
expected_monthly_cost = 3.2
tolerance = 0.05

