kind         = "aws_dynamodb_table"
display_name = "AWS DynamoDB Table"
provider     = "aws"

[mappings.write_request_units]
service        = "AmazonDynamoDB"
product_family = "Amazon DynamoDB PayPerRequest Throughput"
attribute_filters = [
  { key = "group", const = "DDB-WriteUnits" },
]

[mappings.read_request_units]
service        = "AmazonDynamoDB"
product_family = "Amazon DynamoDB PayPerRequest Throughput"
attribute_filters = [
  { key = "group", const = "DDB-ReadUnits" },
]

[mappings.provisioned_write]
service        = "AmazonDynamoDB"
product_family = "Provisioned IOPS"
attribute_filters = [
  { key = "group", const = "DDB-WriteUnits" },
]

[mappings.provisioned_read]
service        = "AmazonDynamoDB"
product_family = "Provisioned IOPS"
attribute_filters = [
  { key = "group", const = "DDB-ReadUnits" },
]

[mappings.storage]
service        = "AmazonDynamoDB"
product_family = "Database Storage"
attribute_filters = []

[[dimensions]]
id       = "write_request_units"
label    = "Write request units"
unit     = "1M requests"
when     = 'default(billing_mode, "PROVISIONED") == "PAY_PER_REQUEST"'
quantity = "default(monthly_write_request_units, 0) / 1000000"
rate     = 'price("write_request_units")'

[[dimensions]]
id       = "read_request_units"
label    = "Read request units"
unit     = "1M requests"
when     = 'default(billing_mode, "PROVISIONED") == "PAY_PER_REQUEST"'
quantity = "default(monthly_read_request_units, 0) / 1000000"
rate     = 'price("read_request_units")'

[[dimensions]]
id       = "write_capacity"
label    = "Provisioned write capacity"
unit     = "WCU-hours"
when     = 'default(billing_mode, "PROVISIONED") == "PROVISIONED"'
quantity = "default(write_capacity, 5) * monthly_hours()"
rate     = 'price("provisioned_write")'

[[dimensions]]
id       = "read_capacity"
label    = "Provisioned read capacity"
unit     = "RCU-hours"
when     = 'default(billing_mode, "PROVISIONED") == "PROVISIONED"'
quantity = "default(read_capacity, 5) * monthly_hours()"
rate     = 'price("provisioned_read")'

[[dimensions]]
id       = "storage"
label    = "Data storage"
unit     = "GB-month"
quantity = "default(storage_gb, 0)"
rate     = 'price("storage")'

[mappings.pitr]
service        = "AmazonDynamoDB"
product_family = "Database Storage"
attribute_filters = [
  { key = "usagetype", const = "USE1-TimedPITRStorage-ByteHrs" },
]

[[dimensions]]
id       = "pitr_backup"
label    = "Point-in-time recovery storage"
unit     = "GB-month"
when     = "default(point_in_time_recovery_enabled, false) == true && default(storage_gb, 0) > 0"
quantity = "default(storage_gb, 0)"
rate     = 'price("pitr")'

[fixture]
attributes = { billing_mode = "PAY_PER_REQUEST", monthly_read_request_units = 5_000_000, monthly_write_request_units = 1_000_000, storage_gb = 10 }
expected_monthly_cost = 2.5
tolerance = 0.05

