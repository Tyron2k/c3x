# Active pipelines (any execution in the prior 30 days) bill $1/month.
# Pipelines that haven't executed in 30 days are FREE. First pipeline
# per account is FREE.
#
# STATIC: CodePipeline isn't exposed in the upstream catalogue
# (probed 2026-06-09).

[[dimensions]]
id       = "active_pipeline"
