kind         = "aws_ssm_parameter"
display_name = "AWS SSM Parameter Store Parameter"
provider     = "aws"

# Standard parameters are FREE (up to 10,000 per account).
# Advanced parameters: $0.05/parameter/month + $0.05/10k API
# interactions. Higher-throughput tier: $0.05 interactions only.
#
# STATIC: rates from published SSM pricing page (probed 2026-06-09;
# AWS Systems Manager has no products in the upstream catalogue).

[[dimensions]]
id       = "parameter"
label    = "SSM parameter"
unit     = "param-months"
quantity = "1"
rate     = 'default(tier, "Standard") == "Advanced" ? 0.05 : 0'
when     = 'default(tier, "Standard") == "Advanced"'

[fixture]
attributes = { tier = "Standard" }
expected_monthly_cost = 0
exact = true
