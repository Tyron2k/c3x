kind         = "aws_memorydb_cluster"
display_name = "AWS MemoryDB Cluster"
provider     = "aws"

# MemoryDB bills per node-hour. The Redis-engine SKU's usagetype is
# `USE1-NodeUsage:<type>`; Valkey-engine rows carry a `:Valkey`
# suffix (~12% cheaper). Cluster node count =
# num_shards × (1 + num_replicas_per_shard).

[mappings.node]
service        = "AmazonMemoryDB"
product_family = "Amazon MemoryDB"
attribute_filters = [
  { key = "usagetype", expr = '''
      "USE1-NodeUsage:" + default(node_type, "db.r6g.large") +
      (default(engine, "redis") == "valkey" ? ":Valkey" : "")
  ''' },
]

[[dimensions]]
id       = "node_hours"
label    = "MemoryDB nodes"
unit     = "node-hours"
quantity = '''
  default(num_shards, 1) * (1 + default(num_replicas_per_shard, 1)) * monthly_hours()
'''
rate     = 'price("node")'

[fixture]
attributes = { node_type = "db.t4g.small", num_replicas_per_shard = 1, num_shards = 1 }
expected_monthly_cost = 70.08
tolerance = 0.05
