kind         = "azurerm_site_recovery_replicated_vm"
display_name = "Azure Site Recovery Replicated VM"
provider     = "azure"

[mappings.instance]
service        = "Azure Site Recovery"
product_family = "Management and Governance"
attribute_filters = [
  { key = "skuName",   const = "Azure" },
  { key = "meterName", const = "VM Replicated to Azure" },
]

[[dimensions]]
id       = "protected_instance"
label    = "Protected instance (Azure-to-Azure)"
unit     = "months"
quantity = "1"
rate     = 'price("instance")'

[fixture]
attributes = {}
expected_monthly_cost = 25
tolerance = 0.05
