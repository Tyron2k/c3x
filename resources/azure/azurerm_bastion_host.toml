kind         = "azurerm_bastion_host"
display_name = "Azure Bastion"
provider     = "azure"

# Bastion bills per-gateway-hour by SKU (Basic / Standard /
# Premium) + data transfer out.

[mappings.gateway]
service        = "Azure Bastion"
product_family = "Networking"
region         = "Global"
attribute_filters = [
  { key = "skuName",  expr = 'default(sku, "Basic")' },
  { key = "meterName", expr = 'default(sku, "Basic") + " Gateway"' },
]

[[dimensions]]
id       = "gateway_hours"
label    = "Bastion host"
unit     = "hours"
quantity = "monthly_hours()"
rate     = 'price("gateway")'

[fixture]
attributes = { sku = "Basic" }
expected_monthly_cost = 138.7
tolerance = 0.05
