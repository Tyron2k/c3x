kind         = "azurerm_eventgrid_topic"
display_name = "Azure Event Grid Topic"
provider     = "azure"

# Event Grid bills per million operations ($0.60/M after the free
# 100k). The upstream "Standard Event Operations" meter is per
# 1M operations.

[mappings.operations]
service        = "Event Grid"
product_family = "Internet of Things"
attribute_filters = [
  { key = "skuName",   const = "Standard" },
  { key = "meterName", const = "Standard Event Operations" },
]

[[dimensions]]
id       = "operations"
label    = "Event operations"
unit     = "1M-operations"
quantity = "default(monthly_operations, 0) / 1000000"
rate     = 'price("operations")'
when     = "default(monthly_operations, 0) > 0"

[fixture]
attributes = { monthly_operations = 10_000_000 }
expected_monthly_cost = 6
tolerance = 0.05
