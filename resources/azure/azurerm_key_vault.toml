kind         = "azurerm_key_vault"
display_name = "Azure Key Vault"
provider     = "azure"

# Standard vault: $0.03 per 10,000 operations. (HSM-backed Premium
# key operations bill a separate Advanced meter, not modelled here.)

[mappings.operations]
service        = "Key Vault"
product_family = "Security"
attribute_filters = [
  { key = "skuName",   const = "Standard" },
  { key = "meterName", const = "Operations" },
]

[[dimensions]]
id       = "operations"
label    = "Vault operations"
unit     = "10K operations"
quantity = "default(monthly_operations, 0) / 10000"
rate     = 'price("operations")'
when     = "default(monthly_operations, 0) > 0"

[fixture]
attributes = { monthly_operations = 100_000 }
expected_monthly_cost = 0.3
tolerance = 0.05
