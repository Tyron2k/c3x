kind         = "azurerm_purview_account"
display_name = "Microsoft Purview Account"
provider     = "azure"

[mappings.capacity]
service        = "Azure Purview"
product_family = "Analytics"
attribute_filters = [
  { key = "skuName",   const = "Standard" },
  { key = "meterName", const = "Standard Capacity Unit" },
]

[[dimensions]]
id       = "capacity"
label    = "Data Map capacity unit (always-on)"
unit     = "hours"
quantity = "monthly_hours()"
rate     = 'price("capacity")'

[fixture]
attributes = {}
expected_monthly_cost = 300.03
tolerance = 0.05
