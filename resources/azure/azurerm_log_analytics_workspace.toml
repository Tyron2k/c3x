kind         = "azurerm_log_analytics_workspace"
display_name = "Azure Log Analytics Workspace"
provider     = "azure"

# Log Analytics "Standard Data Analyzed" (Pay-As-You-Go ingestion) is
# $2.30/GB in the canonical Global tariff and in nearly every region.
# The per-region variants share one meterName/skuName (only the region
# field differs), so no attribute filter can isolate the Global rate,
# and the max-non-zero price picker would select an outlier region
# (germanynorth, $3.738/GB). We pin the canonical $2.30/GB inline —
# the same approach as the nat_gateway cross-AZ rate — so the default
# estimate uses the standard PAYG ingestion price.
[[dimensions]]
id       = "ingestion"
label    = "Standard data analyzed"
unit     = "GB"
quantity = "default(monthly_ingestion_gb, 0)"
rate     = "2.30"

[fixture]
attributes = { monthly_ingestion_gb = 10, monthly_retained_gb = 50 }
# 10 GB x $2.30/GB = $23.00 PAYG ingestion.
expected_monthly_cost = 23.0
exact = true
last_verified = "2026-06-26"
