kind         = "azurerm_netapp_pool"
display_name = "Azure NetApp Files Capacity Pool"
provider     = "azure"

[mappings.capacity]
service        = "Azure NetApp Files"
product_family = "Storage"
attribute_filters = [
  { key = "skuName",   expr = 'default(service_level, "Premium")' },
  { key = "meterName", expr = 'default(service_level, "Premium") + " Capacity"' },
]

[[dimensions]]
id       = "pool_capacity"
label    = "Capacity pool"
unit     = "GiB-hours"
quantity = "default(size_in_tb, 4) * 1024 * monthly_hours()"
rate     = 'price("capacity")'

[fixture]
# 4 TiB Premium × $0.000403/GiB-hr × 730h
attributes = { size_in_tb = 4, service_level = "Premium" }
expected_monthly_cost = 1204.96
tolerance = 0.05
