kind         = "azurerm_dashboard_grafana"
display_name = "Azure Managed Grafana"
provider     = "azure"

# Standard plan: per-node-hour (always-on instance) + per active
# editor/viewer user. Zone redundancy adds a node surcharge (not
# modelled; enable via usage if used).

[mappings.node]
service        = "Azure Grafana Service"
product_family = "Developer Tools"
attribute_filters = [
  { key = "skuName",   const = "Standard" },
  { key = "meterName", const = "Standard Node" },
]

[mappings.user]
service        = "Azure Grafana Service"
product_family = "Developer Tools"
attribute_filters = [
  { key = "skuName",   const = "Standard" },
  { key = "meterName", const = "Standard User" },
]

[[dimensions]]
id       = "node_hours"
label    = "Grafana instance (Standard)"
unit     = "hours"
quantity = "monthly_hours()"
rate     = 'price("node")'

[[dimensions]]
id       = "users"
label    = "Active editors/admins"
unit     = "user-months"
quantity = "default(active_user_count, 1)"
rate     = 'price("user")'

[fixture]
# 730h × $0.0342 + 1 user × $6 = $30.97
attributes = { active_user_count = 1 }
expected_monthly_cost = 30.97
tolerance = 0.05
