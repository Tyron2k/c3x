# STATIC: Azure Monitor alert pricing is $0.10/metric-time-series/month
# (standard), $0.50 for dynamic thresholds. Upstream productFamily
# is "Management and Governance" but discriminating the alert SKU
# from other monitor meters needs filters we can't reliably build.

[[dimensions]]
id       = "alert"
label    = "Metric alert"
unit     = "alert-months"
quantity = "1"
rate     = '''
  default(criteria_metric_name_dynamic, false) ? 0.50 : 0.10
'''

